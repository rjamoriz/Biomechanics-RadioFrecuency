services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: biomech
      POSTGRES_USER: biomech
      POSTGRES_PASSWORD: biomech
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - biomech_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biomech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - biomech_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/biomech
      SPRING_DATASOURCE_USERNAME: biomech
      SPRING_DATASOURCE_PASSWORD: biomech
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-biomech-dev-secret-key-must-be-at-least-32-bytes-long}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - biomech_net

  gateway:
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      BACKEND_URL: http://backend:8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEMO_MODE: "true"
      GATEWAY_PORT: "3001"
      MODELS_DIR: /app/storage/models
    volumes:
      - ./storage/models:/app/storage/models:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - biomech_net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
      gateway:
        condition: service_started
    networks:
      - biomech_net

volumes:
  pg_data:
  redis_data:

networks:
  biomech_net:
    driver: bridge
