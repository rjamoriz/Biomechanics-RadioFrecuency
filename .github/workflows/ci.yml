name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend — Java 21 / Spring Boot / Gradle
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Java 21 · Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: biomech_test
          POSTGRES_USER: biomech
          POSTGRES_PASSWORD: biomech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biomech"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/biomech_test
      SPRING_DATASOURCE_USERNAME: biomech
      SPRING_DATASOURCE_PASSWORD: biomech_test
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: apps/backend/build/reports/tests/

  # ─────────────────────────────────────────────────────────────
  # Gateway — NestJS / Node 20
  # ─────────────────────────────────────────────────────────────
  gateway:
    name: Gateway (NestJS · Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  # ─────────────────────────────────────────────────────────────
  # Web — Next.js / Node 20
  # ─────────────────────────────────────────────────────────────
  web:
    name: Web (Next.js · Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # ML — Python 3.11 / pytest
  # ─────────────────────────────────────────────────────────────
  ml:
    name: ML (Python 3.11 · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ml/pyproject.toml

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=biomech_ml --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-coverage
          path: ml/coverage.xml
